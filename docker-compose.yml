version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: smart_health_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_health
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    container_name: smart_health_backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@db:3306/smart_health
      - PORT=5000
    depends_on:
      - db
    restart: always

  simulator:
    build: 
      context: .
      dockerfile: backend/Dockerfile.simulator
    container_name: smart_health_simulator
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart_health_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:5000
    depends_on:
      - backend

volumes:
  db_data:
