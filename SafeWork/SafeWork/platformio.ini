[env:4d_systems_esp32s3_gen4_r8n16]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
monitor_port = /dev/cu.usbmodem3101 ; Cổng này có thể thay đổi tùy lúc cắm
upload_port = /dev/cu.usbmodem3101
monitor_speed = 115200
upload_speed = 921600
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps = 
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library@^1.1.2
    ; Các thư viện MPU6050 bên dưới không ảnh hưởng đến code MAX30102 này
    adafruit/Adafruit MPU6050@^2.0.1
    adafruit/Adafruit Unified Sensor@^1.1.14
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_size = 8MB
board_build.psram = enable