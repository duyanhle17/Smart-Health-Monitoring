; SafeWork firmware - build one of the environments below.
;   pio run -e tag      -t upload      (worker helmet)
;   pio run -e anchor1  -t upload      (anchor #1)
;   pio run -e anchor2  -t upload
;   pio run -e anchor3  -t upload
;
; NOTE: the DW3000 driver is the Makerfabs "Dw3000" library. PlatformIO
; cannot pull it cleanly from the repo root, so copy the "Dw3000" folder
; from github.com/Makerfabs/Makerfabs-ESP32-UWB-DW3000 into firmware/lib/.

[env]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_size = 8MB
board_build.psram = enable
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library@^1.1.2
    sparkfun/SparkFun BNO08x Cortex Based IMU@^1.0.6

; ---- Worker / Tag: initiator + sensors + WiFi telemetry ----
[env:tag]
build_flags = ${env.build_flags} -DROLE_TAG

; ---- Anchors: pure UWB responders (no sensor libs needed, but harmless) ----
[env:anchor1]
build_flags = ${env.build_flags} -DROLE_ANCHOR -DANCHOR_ID=1

[env:anchor2]
build_flags = ${env.build_flags} -DROLE_ANCHOR -DANCHOR_ID=2

[env:anchor3]
build_flags = ${env.build_flags} -DROLE_ANCHOR -DANCHOR_ID=3
