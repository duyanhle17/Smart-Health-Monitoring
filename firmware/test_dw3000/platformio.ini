; DWM3000 <-> ESP32-S3 test project (standalone)
;
;  1 module (check it works):   pio run -e check      -t upload  &&  pio device monitor
;  2 modules (ranging, later):  pio run -e responder  -t upload   (board A)
;                               pio run -e initiator  -t upload   (board B)
;
; The Dw3000 library is shared from ../lib (lib_extra_dirs) - nothing to copy.

[env]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.mcu = esp32s3
board_build.psram = enable
; share the vendored Dw3000 library in ../lib
lib_extra_dirs = ../lib
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; DW3000 pins (override library defaults)
    -DDW3000_PIN_RST=17
    -DDW3000_PIN_IRQ=18
    -DDW3000_PIN_CS=10
    -DDW3000_PIN_SCK=12
    -DDW3000_PIN_MOSI=11
    -DDW3000_PIN_MISO=13

; --- 1 module: is the DWM3000 alive & SPI wired right? (reads DEV_ID) ---
[env:check]
build_flags = ${env.build_flags} -DTEST_CHECK

; --- 2 modules: single-sided two-way ranging ---
[env:initiator]
build_flags = ${env.build_flags} -DTEST_INITIATOR

[env:responder]
build_flags = ${env.build_flags} -DTEST_RESPONDER
